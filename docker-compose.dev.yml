services:
  # 前端博客 - ThriveX-Blog (Next.js) - 开发模式
  thrivex-blog-dev:
    image: node:20-alpine
    container_name: thrivex-blog-dev
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ./ThriveX-Blog:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
      - ESLINT_NO_DEV_ERRORS=true
      - SKIP_ENV_VALIDATION=true
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
    command: sh -c "npm install && npm run dev:no-lint"
    networks:
      - thrivex-dev-network
    restart: unless-stopped
    depends_on:
      - thrivex-server-dev
    stdin_open: true
    tty: true

  # 管理后台 - ThriveX-Admin (Vite + React) - 开发模式
  thrivex-admin-dev:
    image: node:20-alpine
    container_name: thrivex-admin-dev
    working_dir: /app
    ports:
      - "9100:9100"
    volumes:
      - ./ThriveX-Admin:/app
      - /app/node_modules
      - /app/dist
    environment:
      - NODE_ENV=development
      - VITE_API_BASE_URL=http://localhost:9003
      - ESLINT_NO_DEV_ERRORS=true
      - CHOKIDAR_USEPOLLING=true
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 9100"
    networks:
      - thrivex-dev-network
    restart: unless-stopped
    depends_on:
      - thrivex-server-dev
    stdin_open: true
    tty: true

  # 后端服务 - ThriveX-Server (Spring Boot) - 开发模式
  thrivex-server-dev:
    image: maven:3.8-openjdk-17-slim
    container_name: thrivex-server-dev
    working_dir: /app/blog
    ports:
      - "9003:9003"
      - "5005:5005"  # Java 远程调试端口
      - "35729:35729"  # LiveReload 端口
    volumes:
      - ./ThriveX-Server:/app
      - maven-cache-dev:/root/.m2
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-dev:3306/thrivex_blog?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=GMT%2B8
      - SPRING_DATASOURCE_USERNAME=thrivex
      - SPRING_DATASOURCE_PASSWORD=thrivex123456
      - SPRING_REDIS_HOST=redis-dev
      - SPRING_REDIS_PORT=6379
      - REDIS_HOST=redis-dev
      - REDIS_PORT=6379
      - REDIS_PASSWORD=redis123456
    command: sh -c "mvn compile exec:java -Dexec.mainClass='liuyuyang.net.Main' -Dexec.args='--spring.devtools.restart.enabled=true'"
    networks:
      - thrivex-dev-network
    restart: unless-stopped
    depends_on:
      - mysql-dev
      - redis-dev
    stdin_open: true
    tty: true

  # MySQL 数据库 - 开发环境
  mysql-dev:
    image: mysql:8.0
    container_name: thrivex-mysql-dev
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root123456
      - MYSQL_DATABASE=thrivex_blog
      - MYSQL_USER=thrivex
      - MYSQL_PASSWORD=thrivex123456
      - TZ=Asia/Shanghai
    volumes:
      - mysql-data-dev:/var/lib/mysql
      - ./ThriveX-Server/ThriveX.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./mysql-dev.cnf:/etc/mysql/conf.d/mysql-dev.cnf:ro
    command: --default-authentication-plugin=mysql_native_password --innodb-use-native-aio=0
    networks:
      - thrivex-dev-network
    restart: unless-stopped

  # Redis 缓存 - 开发环境
  redis-dev:
    image: redis:7-alpine
    container_name: thrivex-redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redis-data-dev:/data
      - ./redis-dev.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf --appendonly yes --requirepass redis123456
    networks:
      - thrivex-dev-network
    restart: unless-stopped

  # 开发工具 - 文件监控和同步
  file-watcher:
    image: node:20-alpine
    container_name: thrivex-file-watcher
    working_dir: /workspace
    volumes:
      - ./:/workspace
    command: sh -c "npm install -g nodemon chokidar-cli && echo 'File watcher started' && tail -f /dev/null"
    networks:
      - thrivex-dev-network
    restart: unless-stopped
    profiles:
      - tools

# 网络配置
networks:
  thrivex-dev-network:
    driver: bridge
    name: thrivex-dev-network

# 数据卷配置
volumes:
  mysql-data-dev:
    name: thrivex-mysql-data-dev
  redis-data-dev:
    name: thrivex-redis-data-dev
  maven-cache-dev:
    name: thrivex-maven-cache-dev