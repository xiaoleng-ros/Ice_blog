name: Deploy to Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script_stop: true
          script: |
            echo "=========================================="
            echo "🚀 开始部署 ThriveX Blog"
            echo "=========================================="

            # 进入项目目录（修改为你的实际路径）
            cd /home/ubuntu/Ice_blog

            # 拉取最新代码
            echo "📥 拉取最新代码..."
            git pull origin main

            # ============================================
            # 后端部署
            # ============================================
            echo ""
            echo "📦 部署后端 API..."
            cd ThriveX-Server-Node

            # 安装依赖
            npm install --production

            # 生成 Prisma 客户端
            npx prisma generate

            # 构建 TypeScript
            npm run build

            # 重启后端服务
            pm2 restart thrivex-api || pm2 start dist/server.js --name thrivex-api

            # ============================================
            # 博客前端部署
            # ============================================
            echo ""
            echo "📦 部署博客前端..."
            cd ../ThriveX-Blog

            # 安装依赖
            npm install

            # 构建 Next.js
            npm run build

            # 重启博客服务
            pm2 restart thrivex-blog || pm2 start npm --name thrivex-blog -- start

            # ============================================
            # 管理后台部署
            # ============================================
            echo ""
            echo "📦 部署管理后台..."
            cd ../ThriveX-Admin

            # 安装依赖
            npm install

            # 构建 Vite 静态文件
            npm run build

            # 静态文件已输出到 dist/，Nginx 自动读取
            echo "✅ 管理后台静态文件已更新"

            # ============================================
            # 完成
            # ============================================
            echo ""
            echo "=========================================="
            echo "✅ 部署完成！"
            echo "=========================================="

            # 显示服务状态
            pm2 status
